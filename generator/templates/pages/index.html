{% extends "base.html" %}

{% block content %}

<section class="hero">
    <h1>{{ entity.site_name }}</h1>
    <p>{{ entity.description }}</p>
</section>

<section class="pillars">
    <h2>Explore</h2>
    <ul>
        {% for p in pillars %}
        <li><a href="{{ p.name }}.html">{{ p.title }}</a></li>
        {% endfor %}
    </ul>
</section>

{% endblock %}
