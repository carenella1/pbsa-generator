{% extends "base.html" %}

{% block content %}

<h1>{{ entity.site_name }}</h1>

<p>{{ entity.tagline }}</p>

<p>{{ entity.description }}</p>

<h2>Projects</h2>

<ul>
{% for project in entity.projects %}
<li>
<a href="{{ project.url }}">{{ project.name }}</a>
</li>
{% endfor %}
</ul>

{% endblock %}
